name: Pipeline for WebSocket - Production

on:
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build Docker image
        run: docker buildx build -t ${{ secrets.DOCKER_USERNAME }}/${{secrets.DOCKER_IMAGE_WEBSOCKET}}:latest .

      - name: Push Docker image to Dockerhub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/${{secrets.DOCKER_IMAGE_WEBSOCKET}}:latest

  deploy-to-ec2-instance:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST_WEBSOCKET_PROD }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            echo "Pull, stop, and redeploy the Docker container"
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{secrets.DOCKER_IMAGE_WEBSOCKET}}:latest
            docker stop ${{secrets.DOCKER_IMAGE_WEBSOCKET}} || true
            docker rm ${{secrets.DOCKER_IMAGE_WEBSOCKET}} || true
            docker run --restart always -e PORT=${{secrets.PORT_PROD}} \
                       -e MONGODB_URL=${{secrets.MONGODB_URL_PROD}} \
                       -e MONGODB_DB_NAME=${{secrets.MONGODB_DB_NAME_PROD}} \
                       -e MONGODB_COLLECTION=${{secrets.MONGODB_COLLECTION_PROD}} \
                       -d --name ${{secrets.DOCKER_IMAGE_WEBSOCKET}} \
                       -p ${{secrets.PORT_PROD}}:${{secrets.PORT_PROD}} ${{secrets.DOCKER_USERNAME}}/${{secrets.DOCKER
